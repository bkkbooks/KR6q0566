body:
  text: 侍者成浩記錄住安吉州龍山東禪寺三門堂堂大道千聖共行入此門來莫存知解佛殿趙州不喜聞老姥不欲見試看新長老為君通一線展具便拜據室橫按拄杖云你有一尺去你一尺你有一丈去你一丈直饒格外承當腳跟下好與三十拄杖何也要與衲子結冤讎留待人天作榜樣護法疏釋迦老子二千年前於靈山會上以佛正法付囑國王大臣有力檀那令其廣宣流布拈疏云只此便是原本契書法座盡大地是箇寶華王座行住坐臥總在裏許因甚又要起模作樣還委悉麼雖然舊閣閒田地一度行來一度新遂陞座拈香云此一瓣香天上天下世出世間並屬照臨咸承恩澤爇向爐中端為祝嚴今上皇帝萬歲萬歲萬萬歲恭願皇圖齊北極睿算尋南山八荒咸歌有道四海盡樂無為次拈香云此一瓣香金剛心中流出般若種智栽培花開覺苑記莂靈山奉為滿朝文武闔國勳貴現前請主護法尊官闔郡闔州縉紳文學居士伏願共作皇家柱石同為法社金湯祿位高增福基永固復拈香云此一瓣香本無隱晦曠劫彌新無端東擲西拋以致日昏月昧昔年撞著箇沒意智老漢被伊當頭指出直得耀古騰今光輝溢目人天眾前不敢囊藏被蓋供養金粟堂上傳臨濟正宗三十二世上天下岸老和尚不圖報德酬恩只要遞相鈍置斂衣就座東昇大師白椎云法筵龍象眾當觀第一義師云第一第二已落言詮莫有言外知歸者麼不妨出眾相見問答畢乃云正體本無向背大道迥絕方隅寬廓非外十方剎海目前觀寂寥非內大千同一真如境有時孤峰頂上垂手有時十字街頭晏坐既無城市山林之異豈有世間出世之殊如是則法隨法行法幢隨處建立以一統萬列眾象於臺前舍短從長截群機於句下拈一莖草作丈六金身體無不備將丈六金身作一莖草用無不彰長河為酥酪大地作黃金不是神通妙用亦非法爾如然皆吾心之常分豈有假於他哉秪如法幢建立正脈流通一句又作麼生道喝一喝云一句迥超今古意百千萬派盡朝宗復結椎云諦觀法王法法王法如是下座郡中眾護法請上堂全機大用觸處現成溢目清光貫通今古直下無一絲毫頭遍界全彰奇特事露柱腳跟穩密燈籠眼目精明蒲團坐斷千差拄杖傍通一線高低嶽瀆共轉根本法輪小大鱗毛普現色身三昧使處處齊知覺悟教人人盡證真常直得皇風蕩蕩帝道平平四海晏清兆民樂業且道憑箇甚麼得與麼奇特與麼殊勝豎拂子云天上有星皆拱北人間無水不朝東請兩序上堂舉鶴林玄素禪師住菴時有僧敲門素云誰僧云是僧素云莫道是僧佛來亦不著僧曰因甚不著素云無他棲泊處師云鶴林老人可謂門庭壁立清振一時然檢點將來猶未盡善夫善知識者權衡在握縱奪臨期有時纖塵不立有時遍界齊彰纖塵不立處海納山容遍界齊彰時針劄不入然後可以建法幢立宗旨綱維佛祖開鑿人天發大機顯大用交為肘臂互作主賓所以道你若立時我須坐你若坐時我須立拈起也珠迴玉轉放下也草偃風行秪如不拈不放一句作麼生道妙舞只須誇遍拍三臺元是大家催擊拂子下座至節上堂群陰剝盡一陽來復君子道長小人道縮所以道時節若至其理自彰作麼生是自彰之理梅花不被雪霜侵爭得馨香滿巖谷監院介衡圓戒請上堂釋迦成道日諸人納戒時聖凡無異路達者自同途汝等若能歇卻馳求識取自己則悟道持戒大似病眼見空花其或未然腳下泥深忙進步縱行平處索隄防除夕示眾一年將盡夜萬里未歸人若是到家者拈來著著親作麼生是到家底句若也道得大家團圞頭共說無生話其或未然富貴故鄉歸未得夜行衣錦待何如元旦上堂佛法新年頭有無俱莫筭鑑徹在機先吾道一以貫作麼生是機先底句今年且喜歲朝春上元又是正月半示眾今朝正月半打鼓普請看花燈處處燃月色渾如練燈月兩交輝箇裏誠難辨還辨得麼直饒辨得分明也是認光影底漢示眾趺坐挺起脊梁經行照顧腳下恁般苦口叮嚀只要諸人領話還會麼大蟲被虎傷可煞令人怕示眾舉南石琇禪師云情塵昜遣理障難除盡十方世界空索索地欲求一法了不可得有什麼情塵可遣有什麼理障可除師云南石和尚猶欠悟在只如盡十方世界空索索地欲求一法了不可得此正是情塵理障若是㘞地一聲方知盡十方世界是當人自己盡十方世界是自己光明盡十方世界在自己光明裏雖然如是也須實到者箇田地始得示眾如來禪祖師意一箇鼻頭兩處出氣會得者似井覷驢不會者如牛拽磨示眾清明節屆祭掃墳堂隴頭陌上士女奔忙呼兄喚弟拾翠尋芳東野絃歌酒讌西郊接盃舉觴盡是胸襟流出發揮本地風光一一天真明妙迥絕囊藏若是克家種草不向者裏承當何故須知別有好商量示眾舉應菴和尚云三十三州七十僧驢腮馬頷得人僧諸方若具羅籠手今日無因到淨明師云應菴遠祖恁麼說話未免揚己抑人龍山不然三十三州七十僧祥麟瑞鳳競頭爭諸方盡是羅籠手脫略還他過量人如何是過量人顧左右云參退喫茶示眾晨朝有粥齋時有飯一念相應所作皆辦作麼生是相應底念石壓筍邪出崖懸花倒生示眾舉天目體禪師云久雨不晴雲霧遮障帶累衲僧無處晒㫰師云大小滅翁恁麼語話未免屈抑多人龍山不然久雨忽晴雲開日現俊哉衲僧打成一片正體堂堂絕覆藏輝天鑑地真堪羨示眾喝一喝云端陽佳節忽聞雷百怪千妖化作灰雖則本來田地淨何如奪得錦標回奪得後如何不惟慶快平生事正是男兒得意時示眾九年面壁不逢作者不開拳三遭痛棒一遇知音便分付坐禪成佛何異蒸砂而作飯磨磚作鏡慣將直釣釣獰龍所以道事存函蓋合理應箭鋒拄若是針芥相投自然水乳契合格外承當一句又作麼生道幾回斫額頻相望誰是庭前立雪人示眾舉洞山云初秋夏末諸兄弟東去西去只須向萬里無寸草處去又云萬里無寸草處作麼生去石霜云出門便是草太陽云不出門亦是草漫漫地師云萬里無寸草只道得一半出門不出門總是草裡漢作麼生是轉身底句但識目前無異路何必行從鳥道歸師誕上堂在家三十年騰騰不造惡出家三十年兀兀不修善正當六十時不起聖凡見等閒拈一機佛祖猶難辨故爾按下雲端直得施權設變假饒鐵額銅頭換骨洗腸重煉不是盡法無民只要自開生面剃起列祖心燈與伊聯輝續燄喝一喝上堂問辨魔揀異必資先聖綱宗開鑿人天須會祖宗的旨如何是三玄三要師云何必重拈舊葛藤進云如何是第一玄師云扇子𨁝跳上三十三天進云如何是第二玄師云築著帝釋鼻孔進云如何是第三玄師云東海鯉魚打一棒雨似盆傾進云如何是第一要師云有佛處不得住進云如何是第二要師云無佛處急走過進云如何是第三要師云三千里外逢人不得錯舉乃云秋高氣爽大地清涼梧葉飄金井巖桂競芬芳破砂盆全體獨露乾矢橛遍界馨香山蒼蒼水茫茫一一現成受用頭頭本地風光但見皇風成一片不知何處有封疆中秋示眾心月孤圓性天朗耀無黨無偏虛明自照供養修行拂袖行總是門外打之遶示眾花謝花開自有春風管待雲來雲去逢迎一任青山又何必缽盂安柄土上加泥管什麼松直棘曲鳧短鶴長擲拄杖云兩眼閒閒天地外笑看日月為誰忙師在道場山首座寮結制秉拂上堂方丈和尚引座云今朝十月二十四眾年年雲集盡道老僧母難實為結制起七若道結制起七又是老僧母難到者裏畢竟如何即得不是真師子兒果難分晰大眾要識真師子麼遂喝一喝云問取堂中第一座師陞座云有問有答賓主歷然無問無答玄微莫辨還有識機宜別休咎者麼出眾相見問答畢乃云行腳高人結制堂頭和尚慶生不惟兩彩一賽實乃好事多同一一稽首問訊各各人事匆匆獨有堂中憍陳如尊者自把暖簾放下與十方衲子眉毛廝結和氣氤氳鉗鎚密運爐鞴通紅深錐痛劄截鐵斬釘秉拂上座未免讚歎有分且道讚歎箇甚麼煆教表裏明如鏡證取金剛不壞身卓拄杖下座秉拂夜見星晝見日鴨吞螺螄眼睛突出祖師心印鐵牛機拈向當陽誰辨的難辨的真堪惜須知彼此出家兒切莫自輕而退屈復舉石頭和尚云從來共住不知名恰似兩箇任運相將秪麼行也須照顧腳下自古上賢猶不識莫謗他好造次凡流豈可明不得以己妨人秉拂上座則不然聖凡名號閒言語大地何曾有二人月白風清山突兀頭頭總是自家珍喝一喝秉拂一念不生前後際斷絕點純清一條白練美則美矣善亦未善去卻眼中釘拔卻腦後箭棒下解翻身不住空王殿拶透鐵壁銀山方知本來成現喝一喝復舉那吒太子析骨還父析肉還母復現本身運大神力為父母說法佛眼和尚云肉既還母骨既還父以何為本身學人到者裏見得徹去廓清五蘊吞盡十方苟或未然秉拂上座更為頌出白雲散盡露青山只有金風不改顏歲歲枝頭吹敗葉歸根見蒂逼人塞至節秉拂群陰剝盡復回陽箇事何曾有覆藏除卻目前諸障礙本來正體露堂堂且作麼生是本來正體凍雲開豁山眉展愛日新添一線長復舉疏山因僧問如何是冬來意山云京師出大黃師云者僧外感業惑塵勞內傷禪道佛法暑往寒來眾苦縈纏逼迫疏山用此一味藥頭凡情聖解蕩盡無遺絕後再甦更非他物復頌云直指冬來意京師出大黃病多諳藥性經效始傳方除夕秉拂古人以臘月三十日譬喻眼光落地之時謂是年終歲盡之一大關頭也如彼農業之家為人忠厚不惜勞苦及時趕趁預納租賦當此之際門無索債倉有餘糧燒榾柮火煮野菜羹團圞聚首樂何如也或有不守本分好喫懶做田地荒蕪收成減少在今之日單衣腹饑凍難禁私債官銀互相逼迫舉家愁嘆無地藏身只管怨天尤人不知自作自受我輩沙門釋子遠離俗累發足參方當以己事不明為急務親近明師正真決擇發勇猛心立堅固願母論忙閒動靜不拘春夏秋冬心心不昜念念無差必至大悟大徹而後已更要行解相應方乃所作皆辦此則自利而利他也倘或心高氣傲作事猖狂志力衰微偷安濫食競爭人我恣逞無明戒律乖違因果錯謬愚癡邪見造作無端一朝病苦縈纏方覺此身危脆追思往事怕怖慞惶正所謂業識茫茫無本可據者此也更或發心精嚴戒律誦持禮拜作諸福業修諸苦行不遇明師不聞正法成有漏因他生後世博得一場富貴而已往往見富貴之人昧卻前因不自忖量將謂住世百千萬年縱情恣意妄作妄為起無量貪瞋造無邊惡業殊不知一息不來依舊隨業受報輪轉三塗苦海之中要如今日居名山大川清淨伽藍祖師法窟者豈可得乎所以道此事今生須了卻免教累劫受餘殃久立眾慈伏惟珍重秉拂喪卻目前機去卻胸中物深深海底行高高山頂立撥轉上頭關踏翻知見窟人言俊衲僧我道成狼藉不是盡法無民只要共相委悉復舉丹霞天然禪師過慧林寺值天寒取木佛向火院主呵曰何得燒我木佛霞以杖撥灰云我欲取舍利耳主曰木佛豈有舍利霞云既無舍利更燒兩尊自後院主眉鬚墮落師云看他古人得意之後等閒拈出些子不妨奇特非但院主眉鬚墮落直使盡大地人喪身失命更聽一頌為人徹底世間稀忍凍丹霞不自欺木佛更教重鍛過令他院主落眉鬚解制秉拂天寒人寒瞞你諸人不得滴水滴凍且莫草草承當所以道見聞覺知是法法離見聞覺知直下如王秉劍殺活齊彰似鏡臨臺妍媸立辨一處透脫千處百處光輝一機洞明千機萬機圓轉不從菩薩覓神通不向諸聖求解脫人人常光現前箇箇壁立萬仞其或未然莫道此間山勢險前途更有最高峰
