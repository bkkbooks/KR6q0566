body:
  text: 序余自集寶積録後年頽齒豁懶事筆墨凡諸題詠久矣謝絶乙丑之秋偶臥病中峰日與山色溪聲留連晨夕適侍僧攜侶巖禪姪語録至讀未終篇見其機語穎脫識見軼群誠吾家千里駒也他日大振滹沱之道正未可量頗為吾金粟升兄喜第愧余耄矣恐不能見然亦非升兄頭正尾正焉能得此瞎驢滅卻正法眼藏者哉時康熙乙丑菊月天童山曉皙道人題於中峰疊秀軒侶嚴荷禪師語録序自達磨東來傳最上乘掃除空有不落言詮直指心體六傳而至曹溪又五傳而至臨濟兒孫遍滿天下歷唐宋元明一脈正傳心燈炳煥至天童密雲老祖世稱奇傑拈一條白棒走四海英靈坐斷聖凡情見中興濟北綱宗所以弘覺老人繼起璽書特徵帝王問道更得天岸老和尚宗風大振宿學爭趨道播青齊令行吳越今侶巖和尚乃天老和尚入室真子識見精明機用超卓尋常一言一句無非向上提持發前人之所未發語録流布諸方自有明眼量不敢輕贅一辭世尊云吾有正法眼藏涅槃妙心實相無相微妙法門分付摩訶迦葉西天東土遞代相承直至於今非偶然也是為序時康熙二十四年歲次乙丑佛誕日弟子陳量拜手書
