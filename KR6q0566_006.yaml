body:
  text: 侍者成純記録偈虞山金水若居士有晚年惟好靜之作持以質師師曰不識玄旨徒勞念靜遂以偈示之次來韻忘機何必隱深山心若空時身自閒但得現前諸念盡母勞重把六門關菩提有種休他覓煩惱無根莫妄刪饒舌淨名曾說破那伽只在笑談間壽法雷和尚文章德業足包天應世雄才靜裏蠲幻字肯存先覺譜清名惟入祖燈傳勒回河北千秋運剷盡諸方五味禪昨夜虛空宣壽量言兄法系永綿綿客中偶感離鄉兼得度瞬目已三秋塵念今雖遠師恩愧未酬志同冰雪冷身逐水雲遊謾說心燈續荷衣憶上流壽燈法師憶昔深林植聖基俄然德業冠當時玄機肯讓琅琊辨妙悟還同良遂知言下頓開生佛面聲前掃卻斷常疑人天共祝燈王座權把須彌作壽儀客中壽友知音今偶遇桃李競爭妍幸值中和節喜逢大慶年同袍皆進獻野衲豈空拳拈得天心日權為祝壽錢慰仲紓陳居士未疾維摩乍臥床靈山傳敕勸敷揚為憐捏目空中妄欲醒迷頭鏡裏狂但見有身多病苦誰能去藥把心忘且將香積頻頻獻應驗文殊不二方哭本師和尚曾記當年入室時粗拳毒棒驀頭椎冤深徹骨難分雪幾度思量幾度悲豈料吾師遽爾歸法門此際實艱危謾言大地無依怙正眼寥寥說向誰春日示徒塵緣頓棄事非常好把身心晝夜忘莫道園中花易見曾經無限雪和霜學道如撐逆水舟一篙稍緩即隨流而今幸遇風帆便努力前行莫轉頭示禪者住山與世無心堪入道塵緣淨盡可居山為僧應了為僧事不了為僧也是閒挽潘文卿居士相逢一語便相迎促膝論心把見呈機偶遲思忙打趁由來野衲不容情看破如何更著乖塵緣熾盛道心衰晴乾未作歸家計驀雨臨頭悔不來不生一念諸緣寂逐妄馳求徒自忙今喜身心無別慮回頭本地看風光挽術士歷盡風光八十春乾乾唯德自相親而今夢破應須覺濟世金丹莫外詢護生蓮社次韻淨域不居塵不染撈蝦摝蜆事偏新刀頭突出娘生面優鉢花敷劫外春題活埋軒贈友誰人肯向死前休獨許吾兄出一頭看破世間榮辱事故將醒眼伴荒丘贈五聖閣華嚴道者忘機何必隱深巒布袋橫拖宇宙寬覿面已知華藏海逢人謾說酒臺盤贈友陋巷簞瓢意自如乾乾惟讀古人書年來看破浮雲也三顧從教不出廬贈定道者極力匡扶賴爾身人情爭似道情真辨陽山子如吞卻好與龐公作比鄰贈繼龐道者滿載瀟湘徹底傾西江吸盡悟平生笊篱賣弄家風別撈漉含靈出愛坑贈聚道者不惟金湯法社時參趙老機緣若透其中端的可與佛祖齊肩贈道場山老殿主念年擇火與焚香猶未知身是道場一片慈心巖虎伏兩行妙偈洞龍降飯生臺畔群鴉集補衲階前萬慮忘須信黃梅承記莂栽松憶昔破山陽贈萬月上座廓落無依全聖智瞥興一念翳生睛儻能直下離諸妄性德昭然萬月明贈省牧禪人省得牛兒何用牧山童自向巖邊宿從教隨分納些些露地橫眠春緑贈系道者羡爾頻將世念刪杜門卻客勝居山還須更進竿頭步直透吾宗向上關贈緒道者數載從余苦切磋規模楞角盡揩磨而今正好頻雕琢把住塵勞驗若何贈紹道者甘貧樂道世間稀出入公門愈見奇若向竿頭重進步輝天鑑地丈夫兒贈經道者儒釋從來無二致選官選佛豈多爭丈夫志在經天地何似心空繼祖燈牧牛偈示徒我昔山中曾牧牛鼻繩拽脫懶拘收而今放地倒臥橫眠得自由惟慶禪人回里省師志修淨業偶偈示之踏得自家田地穩娑婆極樂總徒然心光圓滿含沙界豈在尋常染淨邊一鉢千家飽便休得風流處且風知苦樂皆境達境惟心莫外求詠祖華次演祖韻皎潔靈根非外得芬芳五葉一花生色香迥出人間世不假栽培本現成數珠贈量道者燦爛心珠體自圓他方此土只如然為君拈出龜毛索儒釋將來一串穿雪獅子毋論哮吼驚群獸皎潔身心豈易觀不自作威難近傍真風匝地逼人寒秦峰觀海萬派千岐一滴收歸源始得不隨流須知更有深深處說與兒曹莫外求鐘紅爐百煉露真容滿腹經綸孰與同欲識聲光動大地當知全在裏頭空拄杖廉纖迥脫性條直挺特風標衆所欽佛祖當機難近傍為人徹底不容情香爐才離娘懷心已灰受他磨琢幾千回人前莫笑常開口吐出清香遍九垓爆竹兩頭坐斷絶安排一線才通正眼開觸著為人方便處驚天動地語如雷題覺夢軒覺了返觀夢裏身夢中不異覺時人而今夢破何須覺夢覺分明眼上塵捏目戲言空花空朵葉還空長短枝枝滿太空落得眼前空鬧熱收成結果總歸空淨土偈雲棲蓮大師舉自性西方惟心淨土拈云若直指西方豈但去此過十萬億佛剎為非也說箇自性已涉程途若實談淨土不惟寶池金地種種莊嚴者非也才道惟心已成垢物去此二途畢竟如何是西方淨土參諸佛閫奧祖師心髓總被者老人發明殆盡豫不自揣以偈贅之紅稀緑暗夏初長紫燕呢喃繞畫梁不識此間真教體更從何處覓西方彌陀切莫向他求只要當人放下休雲散一輪光皎潔更嫌何處不風流酒樓歌妓音聲細肉案屠兒語話粗忽地喚回霜夜夢彌陀元不異凡夫避喧求寂身中刺滅妄趨真眼裏瘡心地不生諸所見何分東土與西方鬧市孤峰同措足魔宮佛國共安居人言念淨蓮華發我道心空境自如雲橫谷口空山靜花落溪邊野水香欲識彌陀真面目分明遍界不曾藏泥犁不斷貪瞋苦極樂常聞戒定香識得報緣俱是假生天作佛任他忙諸有空時萬法忘松風晝夜為敷揚衆生顛倒愚癡習盡是彌陀常寂光山居十偈焚香非空非木亦非煙徹透三千及大千生佛未形全體露香嚴從此鼻遼天禮佛不住中間與兩頭恆沙妙義一時周雖然物物皆成現無相應須有相求汲水或問居山經幾秋溪深長杓句相酬離波覓水人無數罕見通源達上流採薪倒樹尋根直下休歸來不復更他求可憐枝葉摶量者爭是爭非空白頭掃地大地本來無寸土更從何處著塵埃橫拈倒用皆方便只要勞生眼自開烹茶無賓主句火爐傍今古何人解舉揚有問只須向伊道青絹扇子足風涼栽松天然骨格自凌霄親手移栽最上椒非但古今為榜樣須知不逐四時凋灌園旋旋鏟除間草木時將心地灌鋤耕何期不用栽培力無種靈苗觸處生宴坐空生巖下無消息爭奈諸天花雨何三際十方俱坐斷笑他多口病維摩經行飯罷林間信步行山花野鳥笑相迎白雲流水談空諦說道無情即有情雪日同法雷和尚山居八偈圍爐法雷震凍踡雙腳下蒲團歲歲遭他徹骨寒門外好山看不得一爐榾柮且相安連朝積雪掩柴扉抖擻多年破衲衣寒氣相侵無計較爐中品字是生機看山東嶺西岡遍著花放開雙眼不會遮莫言別有孤峰在淨地何勞更攃沙幾樹銀花看不足相邀攜杖出松關誰知卻被白拈賊偷去門前大案山冰澗涓涓淺溜不聞聲莫問源流一鑑平大海任教寒氣滿自翻波浪拍天行澄清徹底未為優滴水冰生第二頭若要十成無滲漏須教大地絶纖流簷凌點滴相緣幻爾躬虛簷自託掛寒風忽然杲日當空出滿目晶熒一水融滴滴相承孰可通試將端的問龐公當初聞道水無骨今日看來似不同寒花庭際紅梅欲吐香被他寒勒盡摧藏只須揭起雲中日依舊風前播遠芳矻立巖阿傲雪霜幾番徹骨愈馨香但知孤幹藏山塢誰料佳名播遠方折竹幾筒琅玗挺碧霄連朝積雪不相饒陡然一折全聲現露出香嚴滿而嬌一尖才露播藂林高節頻遭風雪侵啐地折兮嚗地斷方知箇裏本無心饑雀相呼相喚似惺惺飛去飛來不暫停一粒飽君休別覓樹頭遺子是冬青本有一時俱打失波波空向外邊飛回頭若識家中寶百劫千生更不饑啼鼠靈鼠親人白晝啼只知求食別無知大梅老漢輕分付惹得狂風遍地吹相逢謾說道途艱冷淡隨時莫改顏且待來年三二月山花山果任君攀一雲四景大塔影地影七段相次路問其中本大尖削正如塔之臥地土人呼為大塔影通身綿密難窺覷覿體崔嵬不可攀欲令含靈離苦趣故遺影跡在溪山獅子口山岩名也凜凜威風孰敢當千妖百怪盡潛藏全身突兀無人識只見渠儂一口張鉢盂峰大庾嶺頭攜不去而今拋出在人前儂家豈是無收拾留待他年作正傳隱山泉一泓清冷映空山徹底無波體自閒只為利生心不盡分身流轉向人間五欲偈財或行或坐獨披襟幾度臨風對月吟肱曲作枕惟自樂不知人世有黃金色觀己形骸渾不淨肯從餘處起閒愁諸般好惡皆前境達境惟心得自由名逃名何必羡巢由隨分三平兩滿休世事靜觀惟自得不知若箇是同儔食一念無求諸想盡饑來但覺野蔬香有時獨步空階上只見紛紛蟻子忙睡隨時豐儉絶追攀贏得身心鎮日閒衲被蒙頭伸腳睡肯將清夢落人間一佛居真淨界中才舉念人天從此費分疏倘能直下明端的六合都盧一佛居登道峰翠薇閣傑閣排空上宗風念虎蹊坡仙留勝跡弘祖有拈提鳥解銜花舞雲來擇樹棲憑欄時一瞬自覺別峰低月室情隨物轉神多昧斂念回看眼自開匝地普天無限意一齊同入此中來六窗緊閉心何切綿密工夫不放開者裏若還通一線徹頭徹尾透將來方竹拄杖用之則行捨之則藏端方其節自命非常扶老挈弱性直心空立身方正不與衆同筆英豪肯被閒拘管脫白披緇暢本懷為了聖凡情解事拖泥帶水出頭來拂子究到羅紋結角處幾回屈曲露真機當陽展拓驅龍象佛祖從教聽指揮燈籠暗室高低總不欺腳根下事始無私光前耀後誰相似了了分明只自知供香代只此現前一著拈來迥脫根塵穿卻遼天鼻孔證取五分法身燈油代點著箇中消息遍界光明烜赫若向者裏承當何止福田利益靜室荷衣松食白雲鄰爭似街頭等箇人驀遇布金賢長者卓錐有地孰云貧米與世不干諸境寂饑來無地覓松花因思昔日廬陵老米價曾拈驗作家施茶代流金爍石火雲天熱惱時聞客路邊若得渠儂身暢快趙州公案請君圓戒衣代威儀嚴整古規模無奈袈裟破碎多幾度裁雲補未就拈來特地告檀那重裝五百羅漢代各逞風流誇好手漫天網子一齊收令渠皮骨通身換若遇知音自點頭華嚴期齊單百城煙水參知識樓閣門開接善財欲透重重無盡義饆饠䭔子下將來雪彌勒因緣示現實奇哉大地從教絶點埃世界身心成一片龍華何必待當來琉璃箇中消息幾人知點著些兒徹四維一切聖賢光影裏輝天鑑地更由誰香爐兩耳閒閒聽自然幾回推出在人前心灰孰謂無言說五分法身親口宣鐘曾向紅爐煆過來當陽扣擊語如雷晨昏歷歷驚襲聵能使華胥夢裡回磬千捶百煉方成器大座當軒悅衆心法要咸承親指示人天瞻仰聽圓音木魚豈是龍門點頞回心空直使愛河摧自從代佛宣揚後歷歷聲光遍九垓風憶昔曾將劫火吹三禪天子盡攢眉煙塵掃蕩尋常事大地承渠一力持無所從來無所去寂然不動遍虛空詰其本際離諸相誰敢將他喚作風贈偉南法弟止影潯溪大隱由來入市廛和光導物豈徒然言前勘破臺山語棒下掀翻普化顛剪燭攤書嵇古範杜門高枕慕先賢他年重振滹沱令滴水從教浪潑天示般若會諸友持戒持經修福者住無所住始相親聲求色見皆邪行不識如來淨法身金剛正體離諸相只要當人眼自開乞食歸來趺足坐空生何故歎奇哉身命資財數若沙布施供養福無差有為畢竟皆虛妄達本忘情始到家示蓮社諸友澄心觀想未為真禮誦無非助道因若得胸中諸念盡蓮華國裏現全身原書闕讚出山像皇宮既捨入山來何事匆匆又復回不說自家無定力向人猶嘆道奇哉布袋和尚睹史陀天不肯住街頭立地等阿誰逢人未語先陪笑半賣風流半是癡觀音大士聞性空兮空不立渾然一片利生心嚴中縷葉常趺坐是則名為觀世音初祖流沙遠涉總徒勞密意何曾有一毫語不投機蘆作渡浪頭爭似問頭高金粟天老和尚老漢一生倔強果是人難近傍擊毒鼓於機前置金圈於掌上斷盡衲僧命根滅卻正法眼藏對天子賣弄風流笑諸方依模畫樣非但佛祖成冤直教父子生謗而今狹路重逢某亦當仁不讓試將惡水驀頭傾驢糞燒香為供養華山見老和尚吾師德相實難量體若冰輪行若霜立挽頽綱扶正法典型後學冠諸方業師浪老和尚師嗣南澗問和尚新安籍寓瓜洲養母三十年題住處名睦菴豫剃染後即命參方睦州何異我師翁作略機宜事事同卻令雲門參鳥骨至今千載仰高風烏山滄冰老法師山川歷遍幾辛艱覓得巖巒自放閒偶爾禪餘詮教法名將義虎播人間東升禪師肖像兩眼閒閒笑滿腮自歌自拍自徘徊調高孰謂知音少坐倚梧桐待鳳來衆居士行樂齊眉舉案真堪羡各佩輪珠百八顆有願雙雙生淨土同聲相應念彌陀跏趺牛背絶塵蹤瀟灑悠然孰與同不貴金丹忘世味指揮如意任西東男婚女嫁渾無事坐看橋流水不流聞說東林多逸士相邀占斷白雲頭
