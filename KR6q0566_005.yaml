body:
  text: 侍者成純記録機緣金粟本師和尚一日落堂問衆各各向未生前道將一句來師云某甲口門窄粟云汝口門闊十丈畢竟道箇什麼師云莫道無言好粟云杜撰禪和粟問大衆經行如何是最初一步師云向和尚道早已落二落三粟云如何是最初一步師擬議粟打云何不道未問已前不較多師有省粟問有一人在門內欲出出不得有一人在門外欲入入不得作何方便令彼出入自由師云大用現前不存規則粟云如何是大用師云斬釘截鐵粟云恁麼則小用了也師云請問和尚如何是大用粟便歸方丈粟問虛空有體須親證虛空體作麼生證師指傍僧云者僧忒恁麼長者僧忒恁麼矮粟云閒言語粟問善財童子登妙高峰頂參德雲比丘因甚七日不見師云官不容針粟云七日後因甚別峰相見師云私通車馬粟頷之粟問枯木崖前蹉路多如何得不蹉去師云歸家罷問程粟云如何是到家底句師云大家在者裏粟云爭奈座上無山僧目前無闍黎師云家醜不可外揚粟云龍蛇易辨衲子難瞞粟赴香林安職事問衆二龍爭珠因甚有爪牙者不得師云不道不得只是不肯承當粟云監院事繁粟問臘月三十日到來畢竟將何抵對請諸公各下一轉語師云心不負人面無慚色適同參徵云既是心不負人因甚侵晨便去討租米師云如此逼拶可謂面有慚色復有偈云四月插新秧農夫曉夜忙未收先納賦何處得愁腸後與法雷和尚話次偶及此師云只如臘月三十日到來兄道將何抵對雷云不因兄舉洎乎忘卻師云真箇那雷云被兄看破舟次因僧舉本師和尚問衆云古者道未明三八九難透祖師關衆下語不契設問大師如何是三八九師云此去嘉興不遠僧云祖師關又作麼生透師高聲云班來班來僧云作麼師云莫教攔卻祖師關僧無語與法雷和尚同結茅於吳門穹窿之北名住處曰味山師問雷云如何是山中味雷云到者方知師云道也太煞只得八成雷云兄作麼生師云冷暖自知復有偈云謾道束腰須用篾荷衣松食且隨時有人若問山中味冷暖從來只自知有鄰僧每詰師來源師云要且不從賢聖中來僧云莫非異類中麼師云隨語生解與法雷和尚話次偶云從上古人兄弟輩同行腳者多同住山者少雷云兩人住山成箇甚麼邊事師云古今榜樣復云兄道成箇甚麼邊事雷云各出隻手師云如何是出手底事雷云日間同煮飯到夜各開單同往雙林舟中見硯上有塵雷問云既在水中因甚有塵師云垛生招箭雷將硯覆卻師云狼籍轉多雷舉摩尼珠人不識如來藏裏親收得珠即不問如何是藏師云無你棲泊處雷云恁麼則不成藏也師云兄見箇什麼道理雷云可惜許師休去雷問三界唯心因甚芭蕉無心而生師云靈苗迥異雷云恁麼則有心也師云兄還識芭蕉麼雷云直饒與麼未識震上座在師云是有心是無心雷云錯舟過曹村雷問既是金姓人所住因甚喚作曹村師云前人置得師問既是曹村因甚姓金人住雷云千年田八百主舉僧問報慈情生智隔因緣雷問情未生時隔固甚麼師云山門對佛殿雷不肯師隨問情未生時隔箇甚麼雷云重疊關山路僧問古人道既是出水蓮花因甚特地一場愁師云垛生招箭又問雷雷云兩重公案同觀臨濟録如蒿枝拂因緣至某甲下手濟度杖與之處雷云兄作者僧作麼生免得臨濟打師云者賊拂袖便出雷云勘破了也觀千巖録示衆云秖要諸人息戰息戰後如何熏風自南來殿閣生微涼師云熏風自南來殿閣生微涼意旨如何雷云受用的受用落節的落節師云兄還是受用還是落節雷云兄道我在甚處師云識得汝了也又示衆云大衆還知老僧落處麼如釣魚放生師云何須特地少間話及五祖巡人犯夜雷云釣魚放生巡人犯夜那一語親師笑云巡人犯夜師問通身是病大地是藥還有為人處也無雷云著甚死急師云洎不問過師問無手人行拳無舌人解語只如無手人打無舌人無舌人道甚麼雷云太煞分明師云也只道得一半雷云兄試道看師云患聾那雷云設有人道兄在鬼窟裏作活計又如何師云一任舉似諸方雷問有問有答賓主歷然無問無答時如何師云傾蓋如故師即舉問雷雷云又是從頭起雷食藥問師云良藥苦口時如何師云禍不入慎家之門雷云有人道兄擔版又如何師云老兄向後不得惑亂人家男女雷云須是老兄始得雷問逢緣不借時如何師云一舉四十九雷云恁麼則借了也師云錯會不少雷云莫是老兄見處麼師云疑則別參師問教中道欲以譬喻而顯示終無有喻能喻此釋迦老子四十九年費許多閒氣力作麼雷云不因漁父引爭得見波濤師云秖如釋迦老子已前還有指示也無雷云錯過不少師云老兄不妨伶俐雷云面皮厚多少師問不見一法是大過患且道不見箇什麼法雷云若是箇人決不恁麼雷隨問且道不見箇什麼法師云普賢菩薩笑你雷云道也太煞只得八成何不道普賢菩薩來也在烏山同觀先老和尚録有問衆云你諸人因甚眼上重添一道眉雷以手掩住云老兄合下箇甚麼語師云面目現在雷放手師云兄又作麼生雷云金粟門下同看月月紅話及去冬雪中大盛雷云此花不是善知識因甚倒行摩竭令師云始見烏山好手雷云兄為甚依傍草木師云今日借兄鼻孔出氣雷云某喫飯兄還飽麼師云老老大大俗氣不除雷云今日放過一著一日同虞山衆紳士諷經次值侍僧請喫點心鏡公王居士問教中道過去心不可得現在心不可得未來心不可得和尚要點那箇心時居士注金剛經師因云只要點老護法不可得底心士無語後有僧問秖如不可得底心作麼生點師云喫粥喫飯更向人借口在僧無語師掌云不知饑飽漢僧問既是常熟因甚麼水潦旱荒師云甜瓜徹蒂甜苦瓠連根苦因居士舉梁山會下園頭問話因緣至傾湫倒嶽時如何云此無別語可答故梁山只得下座云莫教打濕老僧袈裟角師云若與麼只是依他作解有甚麼自由分須知死人路上有活人出身處士云便請大師別代一語師云汝試舉問來士云忽然傾湫倒嶽時如何師云猶涉泥水在士乃禮謝師云逢人切莫錯舉因僧舉有知識問衆如何是隨其顛倒以緇為素衆競下語有云面南看北斗有云日午打三更有云俗人頭戴僧冠帽有云染坊門前掛白布知識皆可之師云總是一模脫出隨語生解所以古人道語不離窠臼焉能出蓋纏僧求代語師云何不道和尚惜取眉毛僧云此是學人語設問大師時如何師云向他道山僧罪過傍僧云前是學人語後是師家語去此二途又作麼生師云不會不會僧云既是善知識因甚道不會師云不見道隨其顛倒以緇為素因居士指壁間法界圖云人人出者裏不得也只是任客投牙師云也須知有不在裏許者士云大師若不在裏許即是外道了師云汝因甚刺腦入膠盆士無語師便打與居士話次舉雲居令侍者送褲與鄰僧僧云我有娘生褲在士隨問娘未生時穿箇甚麼師云要且不是赤身士擬議師掌云寄打雲居老漢在扣水一日食鬼芋次冰云此物能去故疾師云與麼則禪和子喫了佛病法病一切毛病去盡各各做箇脫灑衲僧冰云再過三十年師云和尚因甚不肯自已冰云我無佛病法病師云此亦是病僧問古人道此事惟我能知如何是此事師云處女夢懷胎僧失笑師云你作麼生會僧云某甲今日採茶師打云覺來空懊惱居士問侍僧尊號師云修幻士云既是幻用修作麼師云不得坐在無事甲裏士乃領解師有齊偈云衣底各繫神珠烜赫光明無量拈來呈似山僧是名真法供養乃顧潘文卿云如何是居士底珠卿彈指一下師云謝供養術士問一口氣不來畢竟向甚麼處安身立命師云試卜取一卦看士無語師云將謂陰陽有準元來業識茫茫僧問一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出如何是此經師云築著磕著僧云如何受持師云莫作箇解會師問願成你願成箇甚麼僧云願成無上道師云好人不肯做偏向屎裏臥成量問古人道不與萬法為侶和尚因甚侶巖師云我為法王於法自在僧問如何是法華經師驀豎拳云如是我聞僧云無量義處三昧又作麼生入師云更要重說偈言僧云恁麼則信受奉行也師云特地一場愁僧問子歸就父因甚父全不顧師云恐落今時僧云不落今時時如何師云與我過茶壺來僧問如何是衲衣下事師云蚤兒叮虱兒咬僧無語師云還識痛癢麼系問客來要看賊來要打秖如半夜三更人面似賊賊面似人作麼生辨師把住云道道系擬議師拓開云不勞再勘僧問無縫塔作麼生修師云者漢漏逗了也僧云某甲甚麼處漏逗師云若不漏逗用修作麼僧問雪覆千山因甚孤峰不白師云天生尊貴居士問蛇咬蝦蟆救即是不救即是師云猶聽處分在便打僧問喚作溈山僧又是水牯牛畢竟喚作甚麼師咄云縮頭去僧問如何是一切事究竟堅固師云痛則叫癢則笑師浴次因僧問既是清淨法身因甚要浴師云謝汝殷勤僧浴次復舉前問師云也只要識些痛癢僧無語師云元來不識僧問古者道不栽梧桐免鳳來即今梧桐栽也鳳凰因甚不來師云無他棲泊處僧云來也來也師云眼花不少裁衣次師問無縫襖作麼生做系云針劄不入師云伎倆已盡紹云多一針不成少一針不就師云依稀相似倣佛不同緒云不勞針線已圓成師云未是作家緒云和尚又作麼生師云袖頭取領腋下剜襟僧問釋迦老子貶文殊向二鐵圍山驚得四天王手忙腳亂如何是袖手傍觀底句師云那裏得者箇消息來僧無語師云杓卜聽虛聲僧問盡大地是箇火坑得何三昧不被燒卻師拈扇云汝喚者箇作甚麼僧擬議師云照顧眉毛棟問既是天聖寺因甚被凡火燒卻師云山僧今日被汝看破棟擬議師打云再犯不容僧看法華經問云一小劫畢竟有多少時師彈指云會麼僧罔措師云只知事逐眼前過不覺老從頭上來僧問杲日當空無所不照因甚被片雲遮卻師云闍黎伎倆有盡山僧不采無窮僧問無神通菩薩因甚足跡難尋師云擬見即乖僧云不擬時如何師云有甚回避處師偶恙定問四大本空五蘊非有病從何來師云將謂你是俗漢定擬議師便打僧問承教有言阿逸多不斷煩惱不修禪定佛記此人成佛無疑此理如何師云渾家不管興亡事偏愛和雲占洞庭僧云謝師答話師云夢裏說惺惺紹問不思善不思惡時如何師云你擬向者裏躲根那便打師問心地法門不從人得既不從人得因甚麼佛佛授受祖祖相傳僧云若不入水爭見長人師云也只道得一半僧云和尚作麼生師云何不道不得中郎鑑還同野舍薪到空相寺緒指佛僞問既是空相寺喚者箇作甚麼師云汝不妨會得好緒云某甲不然師云你作麼生緒云暫將黃葉止兒啼師云眼裏無筋一世貧僧問諸佛未出世人人鼻孔遼天出世後因甚杳無消息師云我道遍地是刀鎗僧擬議師打云喪身失命也不知系問大迦葉見佛拈花破顏微笑須菩提聞佛說法涕淚悲泣且道哭底是笑底是師云到家何必問途程到天聖寺緒問金剛正體劫火不能焚山門頭四大老因甚全身敗壞師云你只見全身敗壞且不識金剛正體緒云如何是金剛正體師指云秖者是緒云既是無塵殿因甚衆僧終日打掃師云無塵亦須掃卻緒曰古云龍到水到殿柱龍蟠已久因甚至今不見一勺師云虧缺汝箇甚麼緒擬議師云猶要第二勺在便打僧問久覓知音當面一語因甚不契師云你不肯山僧那僧擬議師便打僧問是維摩病是釋迦病師云試辨看僧遂彈指師云沒交涉僧云蚤已打破大唐國也師云切莫弄虛頭僧云今日親見和尚師劃一劃云猶隔一重山紹問大徹底人本脫生死因甚命根不斷師云疑則別參紹擬議師便打師問新到衲僧家一人所在亦須到半人所在亦須到一人所在且置如何是半人所在僧無對師云何不道今日堂中又添一單有僧要回道場山告假師云你要到那裏去住僧云何處不稱尊師云你因甚在者裏納敗闕僧云某甲幾時納敗闕師云轉見不堪僧問文殊是七佛之師因甚出女子定不得師云道秦不傳天子敕僧云罔明是初地菩薩因甚出得女子定師云只要重論蓋代功僧云且畢竟如何是定師云收得安南又憂塞北便打僧問古人道你有拄杖子我與你拄杖子意旨如何師云志同道合僧云你無拄杖子奪卻你拄杖子又作麼生師云病退藥除僧云如何是拄杖子師云大衆仰觀僧禮拜師云逢人不得錯舉僧問萬境俱侵時如何師云指不自觸僧云逢緣不借時如何師云更來討甚麼碗便打僧問山中猛虎以肉為命因甚不食其子師云畜生猶有者箇在圍爐次僧指火云者箇還雕琢得麼師云再添些柴炭來僧云過後如何師云光透大千僧問大死底人卻活時如何師云更與本分草料始得僧擬議師便打僧問十方諸佛呼為奴歷代祖師喚作婢且道主翁居何國土師云驢前馬後僧云拄杖子化為龍吞卻乾坤了也只如乾坤作麼生吞師云開口見膽僧云一枝梅破臘半夜日穿窗且道屬誰家宗旨師云方於類集僧擬議師打云逢人但恁麼舉衆車水次有問云嘗聞將在謀而不在勇力若不加車輪因甚不轉衆無對僧舉似求代語師代云衆位師發狠車某甲到庫房裏討茶果來便行僧問出息不涉衆緣入息不居蘊界時如何師云猶是時人窠臼僧云和尚又作麼生師云進前來向你道僧擬議師便打系問無角鐵牛眠少室且道有甚麼用處師云留待牽犁拽耙話次偶小貓至師云者箇貓兒生得伶俐緒云者樣伶俐因甚被南泉斬卻師云既被南泉斬卻因甚又在者裏緒云者是和尚底家風師云料掉沒交涉緒云既被南泉斬卻因甚又在者裏師指云貓貓傍僧復如前問師打云者野狐精僧問蚯蚓因甚化為百合師云衆生顛倒僧云板鳴因甚犬吠師云一家有事百家忙僧云貓兒因甚愛捉老鼠師云放過則不可便打僧問古人道偷心死盡方堪入道只如偷心作麼生死師云明眼人前莫說夢僧問如何是普眼法門師云篩籃罾網因居士舉先儒道讀一部華嚴經不如看一艮卦時有客問只如易經從甚麼處起先儒以手劃一劃云從者裡起客曰者一劃又從甚麼處起先儒無對士求師代語師代云甲戊庚牛羊士云甲戊庚牛羊意旨如何師云問取起卦先生士云連者一劃撻抹時如何師云恁麼則覓起處不得了士乃領旨僧問船子和尚囑夾山云汝向去直須藏身處沒蹤跡沒蹤跡處莫藏身如何是藏身處沒蹤跡師云有佛處不得住僧云如何是沒蹤跡處莫藏身師云無佛處急走過僧云船子道我三十年在藥山秪明斯事如何是斯事師云三千里外逢人不得錯舉僧云謝師答話師云摘楊花摘楊花僧問古德云莫謂無心便是道無心猶隔一重關只如者一重關作麼生透師云莫作箇解會僧云某甲即不然師云你又作麼生僧云不勞重下注腳師云千重萬重復以偈示之饑來便喫飯倦來便打睡一切事尋常莫作尋常會僧問古者道見過於師方堪傳授世尊三昧因甚迦葉不知師云好兒終不使爺錢師問心鑑心如明鏡臺因甚不得他黃梅衣鉢鑑無對復舉問師師云更買草鞋行腳始得曰即今親近和尚又作麼生師云打破鏡來與汝相見僧問如何是海底泥牛銜月走師云是大神咒曰如何是巖前石虎抱兒眠師云是大明咒曰如何是鐵蛇鑽入金剛眼師云是無上咒曰如何是崑崙騎象鷺鷥牽師云是無等等咒僧曰此四句中有一句能縱能奪能殺能活且畢竟是那一句師云菩提薩婆訶僧問因甚趙州道狗子無佛性師云為伊吠虛逐塊曰因甚又道狗子有佛性師云灼然一喚便回頭僧問既是龍生龍子鳳生鳳兒因甚道朱門生餓殍白屋出公卿師云不見道男兒當自強僧問洪波浩渺白浪滔天不假扁舟如何得渡師打云到家何必問途程僧問一子出家九祖生天因甚目連母墮地獄師云癡人前不得說夢復以偈示之出家功德實難酬九祖生天第二頭若識本來真面目六凡四聖水中漚師偶恙因僧問如何是祖師西來意師云山僧今日煩躁僧問撥草瞻風秪圖見性只如性作麼生見師云面皺只因陪笑得背駝還為打躬多僧云見得自性便了生死眼光落地生死作麼生了師云當初只道茅長短燒了方知地不平僧云了得生死便知去處四大分散向甚麼處去師云風送泉聲來耳畔月移花影到窗前僧擬議師打云不得向者裡躲根存莽嚴宗伯問先聖云朝聞道夕死可矣且道聞底甚麼道師擊案云還會麼會得則根塵脫落不會則循聲流轉嚴云只如悟道底人還是生在天上生在人間師云應以宰官身得度者現宰官身應以比丘身得度者現比丘身嚴乃欣服師問瀛渤不與萬法為侶者是甚麼人渤云惟我獨尊師云山僧聻曰臨機不見師師云放汝三十棒僧問如何是有佛處不得住師云龍門無宿客僧云如何是無佛處急走過師云鳥道絶行蹤僧云只如道三千里外逢人不得錯舉如何得不錯舉師云者漢話墮了也遂乃連棒打退
