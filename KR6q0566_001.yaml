body:
  text: 侍者成純記録住湖州烏山龍泉菴示衆云把住牢關向上行從教千聖不知名和光略露些些子大地咸叨化日恩所以道法無定相遇緣即宗道在人弘隨宜得妙重整古佛家風勘驗衲僧巴鼻發大用於機前播真風於世外主賓互換權實雙行縱奪臨時卷舒自在文殊普賢光揚法社德山臨濟共贊升平祇如安家樂業一句作麼生道天高群鳥正海闊百川朝復舉三聖道我逢人則出出即不為人興化道我逢人則不出出則便為人師云二大老激揚箇事如珠走盤不留朕迹真所謂調高一時美流千古然檢點將來猶未盡善不見道衆生度盡恆沙佛諸佛何曾度一人且道是為人不為人拈拄杖云鴛鴦繡出從君看不把金針度與人卓一卓下座住苕城師子林示衆云萬頃蒼茫一葉舟東西南北任悠遊絲綸千尺頻施展要使獰龍上直鉤莫有衝浪錦鱗麼成紹出禮拜起歸位立師云不堪持論成緒問楓葉經霜赤禪林瑞氣多法王登寶座一曲和滹沱如何是滹沱曲師云水到渠成進云一句迥超今古意大千何處不聞聞如何是不聞聞師云粧聾作麼進云箇事已蒙師指示普天匝地盡沾恩師云禮拜了退成系問昔日世尊拈華今朝和尚豎拂且道是同是別師云你試定當看進云恁麼則獅子窟中無異獸象王行處絶狐蹤師云是同是別乃云當念不生空諸有海對境無心名觀自在拈一機機機頓赴示一法法法全該不須造作豈假安排擊碎兩處牢關坐斷十方世界猶未是到家消息正好竿頭進步撒手懸崖直得石人鬥禮拜鐵鋸舞三臺更須知有向上一竅在作麼生是向上一竅要知噴鼻馨香意須信風從華裏來復舉黃檗示衆云汝等諸人盡是噇酒糟漢恁麼行腳何處有今日還知大唐國裏無禪師麼時有僧出云只如諸方匡徒領衆又作麼生檗云不道無禪只是無師師云黃檗老祖未免恃一己之見而小覷天下我當時若見道只如諸方匡徒領衆又作麼生但云不道無師只是無禪山僧恁麼道與古人是同是別具眼者試辨看供龍牌示衆拈香祝聖云此瓣香金為枝玉為幹根蟠劫外葉覆須彌端為祝嚴上皇帝聖壽無疆伏願聖明逾日月睿算等乾坤萬邦咸歸至化四海共樂升平闔國官僚高遷祿位遠近檀那盡沐天庥乃就座舉古德云本來無位次不用強安排師云大小古德但知其一不知其二只如欲界雜居豈不是位次四禪四空豈不是位次四果四向豈不是位次三賢十聖豈不是位次等妙二覺豈不是位次且道作麼生安排復躬身云皇帝萬歲萬歲萬萬歲便下座佛誕齋僧示衆云如來不出世亦無有涅槃恁麼説話已是潑狼潑藉了也何況指天指地目顧周行一場特地秪如現前諸公人人鼻直眉橫各各頂天立地那箇男兒不丈夫波波何故從他覓然雖如是無奈睛勞花發睡熟夢生不因漁父引爭得見波濤因齋慶讚一句又作麼生道試玉須經火求珠不離泥卓拄杖下座示衆云春日晴春鳥鳴春山疊疊春水盈盈一一七穿八穴明明百匝千重篆不雕之心印演不説之妙門汝等諸人只是不得將眼見併耳聽何故才有纖毫即是塵示衆舉圓明道瘥病不假驢駝藥三角道瘥病須假驢駝藥金粟先師云二大老活方死用未稱好手金粟則不然一切臨時膏肓必拔師云金粟老人死方活用不妨好手然檢點將來未免執藥成病山僧又不然彼自無瘡勿傷之也示衆舉釋迦老子道若有一人發真歸源十方虛空悉皆消殞演祖道若有一人發真歸源十方虛空築著磕著圓悟和尚道若有一人發真歸源十方虛空錦上鋪花楚石和尚道若有一人發真歸源十方虛空針劄不入師云若有一人發真歸源十方虛空十方虛空示衆拈拄杖云拄杖子𨁝跳觸著舜若多神鼻孔須彌山王忍痛不徹驚倒婆稚阿修羅王卻與帝釋眉毛廝結正恁麼時阿誰解交靠卻拄杖云有理不在高聲復舉古德云終日拈香擇火不知身是道場又有云終日拈香擇火不知真箇道場又有云終日拈香擇火不知拈香擇火師云終日拈香擇火便作拈香擇火示衆舉洞山掇退果桌話大溈哲和尚云還知洞山落處麼若也不知往往作是非得失會去諸仁者遮果子非但泰首座不得喫設使盡大地人來亦不得正眼覷著師云蒼蠅偏向臭邊飛既不作是非得失會則遮果子盡大地人阿誰無分然雖如是恁麼會則易相續也大難示衆舉先聖云一切法無生一切法無滅若能如是解諸佛常現前師云先聖恁麼道恰似認奴作郎山僧則不然一切法無生亦復無有滅若作如是解知君猶未瞥畢竟如何乃搖手云不説不説示衆舉金鸞一日在廚前見典座便問變生成熟即不無典座離卻木杓道將一句來無語自代云羊羔雖美衆口難調端祖云法華則不然離卻木杓一句作麼生道人情若好喫水也肥師云二大老恁麼答話恰似家貧怨鄰富山僧又不然離卻木杓一句作麼生道天寒日短兩人共一碗示衆不是心不是佛乃展手云攃開兩手大家看畢竟明明是何物良久云承虛接響人無數到底難傳太古音便下座示衆舉千巖和尚示衆云教中道一切賢聖皆以無為法而有差別釋迦老子兩箇舌頭無明只有一箇舌頭一切賢聖皆以無為法而無差別師云若道無差別違了世尊若道有差別背了祖師且畢竟如何即是衆競下語畢師云兩段不同收歸上科向下文長付在來日示衆云諸仁者切莫欣聖厭凡捨垢取淨若情存取捨意生欣厭盡是錯亂顛倒須知極樂世界與無間地獄同一受用何故報緣虛假真性無二便恁麼去猶是依他作解障自悟門且畢竟如何話會良久云止止不須説我法妙難思示衆云學道如登萬仞山無依倚處好追攀只須高步毗盧頂方可全身入鬧藍復舉婆子燒庵話師云者則語古今拈弄者極多爭奈十箇五雙出他婆子圈繢不得山僧不惜眉毛也要諸方檢點正恁麼時如何肚飢要喫飯示衆云即心即佛開口成雙橛非心非佛無言落二三不是心不是佛不是物喝一喝云罕逢穿耳客多遇刻舟人示衆舉僧問趙州如何修行得不錯路州云識心見性是不錯路師云咄咄是何言歟大小趙州猶作座主見解設有問山僧如何修行得不錯路但向他道驀直去示衆云本來是佛何用他求直下承當埋沒自己儻更遲疑白雲萬里卓拄杖云子期去不返浩浩良可悲復舉青原令石頭持書與南嶽讓和尚曰汝達書了速回吾有箇鈯斧子與汝住山頭至彼未呈書便問不慕諸聖不重己靈時如何嶽曰子問太高生何不向下問頭曰寧可永劫受沉淪不從諸聖求解脫嶽便休頭回原問子返何速書信達否頭曰書亦不通信亦不達去日蒙和尚許箇鈯斧子祇今便請原垂一足頭便禮拜師云我要問石頭既不慕諸聖不重己靈更討箇鈯斧子作麼然雖如是手執夜明符幾箇知天曉示衆舉金峰因僧參禮峰云我有則語舉似汝但不得錯會僧云請和尚舉峰豎起拂子僧作聽勢峰云錯會了也僧以目視峰而出峰云雪上加霜虎丘云金峰垂鉤四海只釣獰龍者僧清波有路未免貪他香餌諸人還知金峰為人處麼見月休觀指歸家罷問程師云金峰剜肉作瘡者僧隨邪逐惡虎丘證龜成鱉山僧路見不平也只要正眼流通殊不知金峰老漢擬舉拂子時蚤已自錯了也示衆舉雲蓋安和尚問石霜萬戶俱閉即不問萬戶俱開時如何霜云堂中事作麼生安云無人接得渠霜云道也太煞只道得八成安云卻請和尚道霜云無人識得渠師云兩箇漢絲來線去弄精魂設有問堂中事作麼生但云分付維那打鐘著示衆舉古德云身口意清淨是名佛出世身口意不淨即名佛滅度師云不著福智莊嚴則身清淨不談禪道佛法則口清淨不住靜照覺觀則意清淨復云佛聻切忌話墮時有僧出云恁麼則落空了也師云蒼天蒼天示衆云法法皆備於己切莫自生欣厭隨時得座披衣説甚萬年一念喝一喝復舉雲峰因僧問如何是心地法門峰云不從人得僧云不從人得時如何峰云此去衡陽不遠妙喜云雲門即不然如何是心地法門不從人得不從人得時如何看腳下楚石和尚云或問天寧如何是心地法門不從人得不從人得時如何早晨有粥齋時有飯師云設有人問山僧如何是心地法門不從人得不從人得時如何佛國魔宮天堂地獄示衆云處處真處處真塵塵盡是本來人真實説時聲不見正體堂堂沒卻身既是正體堂堂因甚道沒卻身直饒玄會得也是眼中塵復舉臨濟上堂云赤肉團上有一無位真人常在汝等諸人面門出入未證據者看看師云臨濟老漢漏逗了也既是無位真人因甚在赤肉團上太煞粘牙綴齒又説甚麼面門出入雪上更加霜諸仁者若向者裏著得隻眼捉敗古人管取天下橫行倘更躊躇拈拄杖云未證據者看看擲拄杖下座示衆舉興化云我昨日赴箇村齋中途遇一陳卒風暴雨卻向古廟裏避得過師云山僧夜來入城回至中途驀遇卒風暴雨直得前不搆村後不迭店通身是雨沒回避處且道古人是山僧是試辨看示衆舉甘贄行者入南泉設齋黃檗為首座行者請施財座云財法二施等無差別甘云恁麼道爭消得某甲嚫便將出去須臾復入云請施財座云財法二施等無差別甘便行嚫師云甘贄行者大似暴富乞兒賣弄殘羹餿汁黃檗老祖雖然深辨來風於中猶欠一著在爭如現前諸公盡是家裏人只説家裏話更不起模作樣正所謂有麝自然香何必當風立因齋慶讚又作麼生良久云洎合重説偈言示衆舉華嚴云若有見正覺解脫離諸漏不著一切世彼非正道眼師云蓋為我法未忘情存取捨若實無我則無一切法若無一切法則無一切境界若無一切境界則無所依若無所依則無所住若無所住則全體法界復云咄咄不得住在者裏示衆舉洞山參雲門門問近離甚處曰查渡云夏在甚處曰湖南報慈云幾時離彼曰八月二十五云放汝三頓棒山次日卻上問訊昨日蒙和尚放三頓棒不知過在甚處門云飯袋子江西湖南便恁麼去山於言下大悟師云洞山雖悟有屈難伸諸仁者還識雲門老漢麼笙歌引出畫堂前幾度醉遊明月下示衆舉世尊一日升座大衆才集文殊白椎云諦觀法王法法王法如是世尊便下座師云世尊文殊雖然唱隨合拍縱奪可觀若是激揚箇事且緩緩何故話在示衆舉教中道妙性圓明離諸名相師云釋迦老子恁麼説話大似抱贓叫屈秖如妙性豈不是名圓明豈不是相作麼生説箇離諸名相底道理還有為釋迦老子作主者麼出來與拄杖子相見示衆舉般若多羅尊者因東印土國王請齋次王乃問諸人盡轉經師何不轉祖曰貧道出息不隨衆緣入息不居蘊界常轉如是經百千萬億卷非但一卷兩卷石屋和尚云諸禪德尊者與麼答話醫得眼前瘡剜卻心頭肉若有問福源諸人皆轉經長老因甚不轉只對他道白日窗前清宵月下要轉便轉要罷便罷諸禪德且道福灥與尊者還有優劣也無若檢點得出許你具一隻眼師云一人於理上偏枯一人向事上著到若要理事圓融二大老敢保未在作麼生得如理如事去乃顧侍者云裝香著復頌云事理融通真法界塵中經卷等三千呼童香爇金爐內坐聽森羅萬象宣示衆離卻瓶盤叉釧真金不自外來就乎酥酪醍醐美味悉從中出喝一喝云毗婆尸佛蚤留心直至如今不得妙復舉達磨大師云我本求心不求佛拈一放一不是好手了知三界空無物將謂別有長處不如端坐靜觀心元來只在者裏只此心心心是佛依前錯認定盤星荷上座則不然何用求心不求佛須知三界非他物若言端坐靜觀心未免重添眼裏屑卓拄杖下座示衆舉保福云此事如擊石火閃電光搆得搆不得未免喪身失命先師云保福大似徐六擔版金粟不然此事似地擎山不知山之孤峻如石含玉不知玉之無瑕搆得搆不得不怕甕中走卻鱉師云二大老激揚此事何異五彩畫虛空徒勞心力耳豈不見道若以譬喻而顯示終無有喻能喻此且畢竟如何各各歸堂喫茶去示衆問云離心意識參絶凡聖路學秖如離心意識作麼生參衆久不出乃云禪非意想立意乖宗道絶功勛建功失旨所以道靈光獨耀迥脫根塵要須句外承當莫向言中取則明眼漢沒窠臼有時轉山河大地歸自己毋意毋必有時轉自己歸山河大地毋固毋我物物頭頭全彰塵塵剎剎大用不落己見外緣一句又作麼生道顧左右云座中盡是江南客何用樽前唱鷓鴣擊拂子下座示衆云盡道迷因悟遣誰知悟是迷根直饒迷悟頓除到此且居門外何也還家盡是兒孫事祖父從來不出門示衆云纖毫未盡遭魔罥脫體無依在半途且作麼生是到家底句良久云曾為浪子偏憐客每向扁舟憶故人示衆舉百丈一日侍馬祖行次見一群野鴨飛過祖問云是甚麼丈曰野鴨子云甚處去也曰飛過去也祖便扭丈鼻頭丈負痛失聲祖云又道飛過去也丈於言下有省師云諸仁者既是野鴨子飛去因甚扭他百丈鼻頭莫非物我不異鼻頭便是野鴨子麼恁麼見解笑倒衲僧既不然百丈因甚悟去山僧見處也要諸人共知拈拄杖云竿頭絲線從君弄不犯清波意自殊卓一卓下座示衆舉先聖道在有破有居空破空二幻既除中道不立師云先聖恁麼道真所謂貧恨一身多山僧即不然有則同有空則同空隨流識性觸處皆真喝一喝云出頭天外看須是箇般人示衆舉趙州因僧辭去州曰有佛處不得住緇素分明無佛處急走過回途得妙三千里外逢人不得錯舉枝蔓重生僧云恁麼則不去也葛藤絆倒州曰摘楊花摘楊花本是釣魚船上客卻來平地摝魚蝦示衆舉雲門大師道古人因慈悲之故而有落草之談隨語識人若是出草之談即不與麼若與麼便有重話會金粟先師云作麼生是出草之談以拄杖一時趁下師云者正是落草之談且如何是出草之談劍去久矣爾方刻舟示衆云識得拄杖子參學事畢拈拄杖云看看拄杖子吞卻乾坤大地了也且道三世諸佛向甚麼處教化衆生歷代祖師向甚麼處流通正眼蠢動含靈向甚麼處俯仰屈伸汝等諸人向甚麼處轉身吐氣若是箇漢聞恁麼舉一肩擔荷得去擎展一任擎展提持一任提持橫三豎四無可不可其或未然進一步被拄杖子迷卻路頭退一步被拄杖子截斷腳跟擬開口被拄杖子礙卻舌頭不開口被拄杖子換卻眼睛諸兄弟還識拄杖子麼若也識得參學事畢若也未識急須識取他時後日莫被拄杖子瞞連卓拄杖下座示衆云一二三四五六七朝朝暮暮為君決眉毛剔起好生參見得分明秖半橛那半橛應自瞥須信人間只一僧畢竟天無第二月機解亡玄路絶金烏夜半徹天飛百草頭邊齊漏泄喝一喝復舉僧問雲門不起一念還有過也無門云須彌山師云者僧轉身無路雲門觸處傍通汝等若向未舉已前薦得管取天下橫行其或未然總被須彌山壓倒山僧不惜眉毛更為頌出只要當人正眼開何關起念不起念韶陽拈出須彌盧一擊虛空七八片真堪羡剎剎塵塵達本鄉縱橫順逆皆方便示衆云連日因居士與山僧講四書驀拈一章要山僧自講被伊抑逼一上不妨舉似大衆顏淵喟然歎曰見箇甚麼道理速道速道仰之彌高鑽之彌堅水中捉月徒誇巧瞻之在前忽焉在後覓即知君不可見夫子循循然善誘人向你道甚麼博我以文約我以禮依然錯認定盤星欲罷不能夜明簾外轉身難既竭吾才如有所立卓爾還須更進竿頭步雖欲從之末由也已金鎖玄關擘不開諸兄弟還知顏子落處麼將成九仞之山尚欠一簣之土若到祖師門下驀頭更與一拶管取蓋天蓋地去也山僧恁麼告報汝等還揀辨得出麼還緇素得明麼若向者裏著得一隻眼不用顧後瞻前便請歸家穩坐所以道處處逢歸路頭頭是故鄉本來成現事何必待思量喝一喝卓拄杖下座示衆云衆生逐境生情隨情造業故爾業繫苦果諸聖達境惟心心體離念所以萬德莊嚴祗如衲僧分上又作麼生喝一喝云若是陶淵明攢眉便歸去示衆云覓心不得把心安大丈夫兒豈自瞞意氣不從天地得真金須向火中看所以道垂鉤四海只釣獰龍格外談玄為求知識事是恁麼事人須恁麼人若是恁麼人方明恁麼事大衆還知恁麼事麼乃卓拄杖云換骨洗腸重整頓通身手眼更須參復舉天童密雲老祖因僧問如何是大事未明如喪考妣祖云你是無主孤魂僧云既是大事已明因甚亦如喪考妣祖云惟吾獨尊師云天童老祖機輪轉處如杲日麗於中天正所謂高低普應事理齊彰爭奈錯會者多山僧不辭頌出秖緣不識本爺娘孤苦伶俜客路長踏得自家田地穩人間天上更無雙因事示衆夜來枕上參無上勝長者而謂我言知時不論理論理不知時恍於言下大徹得無諍三昧入隨順世間法門覺則儼然姑記之以俟明眼證焉示衆乃拈拄杖云是則觸非則背直截示人人不會萬象森羅一口吞須彌倒卓虛空碎橫按拄杖云非不背是不觸拈來顛倒從君數辭窮識盡髑髏乾五五依然二十五卓拄杖云觸即背背即觸爍迦羅眼莫能睹無言童子口喃喃斑斕大蟲不是虎靠拄杖云拈卻觸去卻背明眼人前何足貴正體堂堂絶覆藏見聞知覺真三昧復喝一喝示衆云如來涅槃心祖師正法眼一一露當陽明明無隱諱只要諸人略回光相自著眼看可以克證無生頓超方便不見水潦和尚參馬祖問佛法的的大意被祖攔胸踏倒忽然大悟起來呵呵大笑云百千法門無量妙義只向一毫頭上識得根源去諸兄弟若恁麼豈不快哉雖然如是猶涉程途在不涉程途一句又作麼生道當臺寶鑑明如日一亙晴空絶是非示衆云釋迦老子道一切衆生具有如來智慧德相但以妄想執著而不證得諸仁者還知妄想執著麼不但世間人我是非塵勞煩惱是妄想執著直饒念佛持咒誦經禮懺也是妄想執著持戒修身約教觀心也是妄想執著六度萬行迷悟因果也是妄想執著安禪息慮打七打五也是妄想執著乃至綱宗玄要賓主料揀正偏回互事理藏鋒以要言之總是妄想執著且作麼生是智慧德相還委悉麼要知智慧德相慎勿他求但了妄想執著便是智慧德相秪如妄想執著又作麼生了乃拈拄杖云是柱不見柱非柱不見柱卓一卓云是非已去了是非裏薦取示衆舉永明大士云有禪有淨土猶如戴角虎現世為人師當來成佛祖有禪無淨土十人九錯路陰境忽現前瞥爾隨他去無禪有淨土萬修萬人去但得見彌陀何愁不開悟無禪無淨土鐵床併銅柱百劫與千生沒箇人依怙師云永明老人恁麼激揚大似拗曲作直傍若無人山僧則不然有禪有淨土常見堅且固有禪無淨土猶落在頂墮無禪有淨土戀筏何能渡無禪無淨土正體堂堂露卓拄杖云一踏鴻門兩扇開還須更進竿頭步喝一喝受龍山監院介衡請示衆自慚德薄福緣慳土面灰頭不記年忽地使符天外至無端推出在人前所以道欲識佛性義當觀時節因緣山僧晦迹城隍杜門守拙適承安吉州當道衆護法台翰下頒以東禪古剎見招既而辭讓不及理應曲顧時宜只得將從上乃祖乃父用不盡的八字打開布施現前大衆不惟知源達本只要正眼流通驀豎拂子召衆云還委悉麼若向者裏見得徹去又何必福城東際始見文殊樓閣門開方參慈氏直下如天普蓋似地普擎如日普照如風普吹頭頭物物闡揚剎剎塵塵示現拈拄杖云看看拄杖子化龍去也際會風雲當此日為霖為雨潤乾坤卓拄杖下座
