body:
  text: 侍者成純記録垂代衆道友啓淨行會示衆云只此一敘非同小緣汝等各各生希有心作難遭想直下徹悟自理如説而行至究竟處離諸退墮所以道欲行千里一步為初如何是最初一步請諸公各下一轉語成棟云今日特來做會師云隨人起倒進云莫壓良為賤師云理無曲斷成緒云草履不沾塵師云你面上因甚有灰進云和尚莫誘人犯法師云脫空妄語成系云不向他人行處行師云你向甚麼處行進云威音那畔更那畔師云墮坑落塹成定云暫且牧牛師云此去西天路迢迢十萬程成紹云與麼問即落七落八師云你不妨伶俐如何是最初一步進云不勞彈指力當下已圓成師云若起無事心棒了趁出院衆下語畢師云汝等要會最初一步麼乃高聲云看腳下問衆古者道善財參遍處黑豆未生芽各各向黑豆未生芽時道一句看文卿云雲在青天水在瓶師云沒交涉岧梅云只恐枝葉太多生師云也只道得八成進云和尚又作麼生師云一華一佛土一葉一釋迦問衆懷州牛喫禾因甚益州馬腹脹衆下語不契師代云樂則同歡問衆不與萬法為侶者是什麼人梅云高高山頂立深深海底行紹云點即不到緒云家無二主定云床窄先臥師俱不肯乃代云擔版漢問衆一句當天八萬門永絶生死且道是那一句緒云舌頭不出口師掌云須知雲外千峰上別有靈松帶露寒緒拜云大衆沾恩去也師云獨你無分復云既是大衆沾恩因甚獨你無分緒云太平本是將軍建不許將軍見太平師云不然何不道禍不入慎家之門潘姚數居士到山師問枯木崖前蹉路多如何得不蹉去潘云人間無水不朝東師云只道得一半姚云從來不出門師云你因甚在者裏姚無語師代云何不道某甲不是外人師偶恙史方二居士入山省視師問云四山相逼時如何史云海闊從魚躍天空任鳥飛師云者是甚麼時節作恁般語話方云身在其中總不知師云既在其中因甚不知方無對師代云何不道某甲不在裏許問衆不入驚人浪難逢稱意魚驚人浪已入如何是稱意魚緒云頭正尾正師云一釣便上良久衆不出師乃云一齊點下以拄杖旋風打散有募緣僧云居士今生作福來生受士云我徽州人有錢不買半年間僧無對士舉似師求代語師代云家無千日貨不是掌財人問衆呂真人云自從一見黃龍後始覺從前錯用心只如真人恁麼道意在甚麼處衆下語不契師代云曾為浪子偏憐客故與行人指路頭軒名別一天師問衆如何是別一天紹云不離此地緒云居塵不染塵定云欲窮千里目更上一層樓衆下語畢師云我則不然何不道到者方知師嘗有偈云豁開兩眼看明月莫似從前指上觀乃問衆如何是月超昂云黑漆漆系云普天匝地緒云劈開華嶽千峰秀照見黃河徹底清師云總是一模脫出只認得箇月影要且不識真月乃顧緒云如何是月緒擬對師以手掩其口云莫似從前指上觀問衆大修行人當遵佛行因甚不守毗尼衆下語不契師代云到岸不須舟師問拜經僧云只如經與你有甚冤讎你只管拜他僧無語師命衆代語衆下語不契師代云不圖打草只要蛇驚問衆把手牽伊行不得惟人自肯乃方親那裏是諸人自肯處試道看緒云痾屎放尿盡是學人巴鼻師云錯紹云飯後必飽師云隨群逐隊漢棟云今日天熱赤膊師云一對無孔鐵槌系云踏著稱錘硬似鐵師云偶爾成文衆下語畢師云須知遠煙浪別有好商量問衆既是天上月圓因甚人間道月半衆下語不契師代云一人傳虛萬人傳實師代友人擬禁中偈云恩情顧戀如枷鎖枷鎖臨身念慮忘獄吏牢頭親接引腳跟不動到西方復問衆云如何是西方境衆下語不契師代云阿㖿阿㖿輕打我問衆佛祖公案一箇道理因甚有明與不明衆下語不契師代云是汝等眼昏問衆古聖不安排至今無處所因甚道水在長江月在天衆下語不契師代云不經一事不長一智問衆碟兒大碗兒小則不問你諸人飯是米做一句作麼生道衆下語不契師云須知盤中餐粒粒皆辛苦問衆參方須具參方眼如何是參方眼衆競下語師俱不肯乃代云善財童子彌勒世尊問衆樹凋葉落時如何系云窮無遮處緒云赤條條地昂云露出本來身師云我則不然峰巒理舊容問衆長安雖鬧我國晏然如何是晏然底句緒云萬里不挂片雲師云墮坑落塹棟叉手近前師云一對無孔鐵槌文卿云眉橫鼻直師云同坑無異土系云太平天子師云茫茫者匝地普天衆下語畢師代云滿耳青黃滿眼聲問衆庭前殘雪日輪消室內紅塵遣誰掃系云喚甚麼作塵師云自屎不覺臭紹云用掃作麼師云無繩自縛漢衆下語畢師云誰人知此意令我憶曹溪問衆年窮歲盡時如何衆競下語師俱不肯乃代云請銷欠帳免挂尊名問衆既是金身羅漢因甚被火燒卻系云賣盡風流紹云始得脫落根塵定云真金須向火中看師俱不肯乃代云不見道自了漢問衆依法生解猶落魔界獨脫一句作麼生道紹云將機就機師云葛藤遍地系云啼得血流無用處不如緘口過殘春師云也只道得一半衆下語畢師乃旋風打散問衆人人有箇影子步步不離因甚踏不著衆下語不契師代云從門入者不是家珍問衆先聖道應緣而化物方便呼為智若不方便喚作甚麼緒云從來不識師不肯乃代云眼見如盲口説如啞問衆通身是口因甚道不得阿爺名字緒云不敢犯上紹云惟恐玷污衆競下語師俱不肯乃代云恩深無語懷抱分明問衆雲門是佛祖兒孫因甚要打殺釋迦老子紹云祖彌不了殃及兒孫定云大用現前不存軌則衆競下語師俱不肯乃代云不因舒毒手爭見報恩人師問僧名甚麼僧云惟善師云惡不可得善自何來僧無對師命衆代語衆競下語師俱不肯乃代云但以假名字引導於衆生問衆是處是慈氏無門無善財因甚道琉璃殿上無知識衆下語不契師代云江南地暖塞北天寒問衆有人犯罪當處決若殺則違佛戒不殺又違王令且作麼生處斷衆下語不契師代云格問衆六箇骰子滿盆紅作麼生賽衆下語不契師代云好手不彰名有誦經僧喫齋次居士問經中道無眼耳鼻舌身意將甚麼喫齋僧無對士舉似師求代語師云孟八郎漢又恁麼去也衆諷經次師問云白底是紙黑底是字那箇是汝等諷底經定云鐘鼓分明系云向下文長明日與和尚道明一云滿口道不出密堅云諦聽諦聽師俱不肯乃云穿雲俊鶻便合乘時止濼困魚徒勞激浪紹云求波不離水師云切忌沒頭浸殺問衆不萌之草如何藏得香象衆競下語師俱不肯乃代云海闊山高問衆教中道知有涅槃不戀三界意旨如何衆下語不契師代云似將黃葉止兒啼問衆重陽九日菊花新意旨如何衆下語不契師代云知音不用頻頻舉達者應須暗裏驚問衆未明心地印難透祖師關如何是心地印系云片月澄空師云也只道得一半系云和尚作麼生師云屋破見青天一日舉古德云一念不落諸緣證取自家境界師云大小古德慣捏死蛇頭未解變通在山僧不然假饒念念攀緣不離自家境界復顧衆云如何是自家境界昂云癢處多搔師云放汝三十棒衆競下語師俱不肯乃代云逆則嗔順則喜問衆盡大地是吹毛利劍你向甚麼處存扎紹云金不博金師云學語之流紹云是何言歟師云盡大地是火坑得何三昧不被燒卻紹云箇中無別物師云者是茶鍾者是茶壺作麼生説箇無別物底道理紹云和尚莫眼花師云放汝三十棒問衆既是透網金鱗因甚麼重重點額緒云卻是和尚鈍置某甲師云且莫錯怪山僧衆下語不契師代云何不道伯牙縱有高山調不遇知音也是間問衆不見一法是你諸人眼睛者是蒲團者是香版作麼生説箇不見一法底道理紹云天上天下唯我獨尊師云爭奈蒲團香版何紹云和尚莫錯認師云如何是不錯認紹云天上天下唯我獨尊師云一口吸盡西江水則且置試將我竹篦子吞吞看紹云和尚遞將竹篦子來師云看你吞吐不下師有偈云每憶嵩山達磨復思船子鳥窠自無一椽一瓦至今殿宇巍峨復顧衆云既無一椽一瓦因甚殿宇巍峨緒云只為兒孫得力師云今日被者漢鈍置一上衆競下語師俱不肯乃代云古今榜樣問衆教中道一切有身悉皆不淨只如三十二相又作麼生衆下語不契師代云污我法身問衆貓兒因甚愛捉老鼠緒云分內事紹云貴圖天下太平弘機云熟境難忘師不肯乃代云肚裏飢師問以岸生死海中以何為岸岸無對復命衆代語緒云數珠在某甲手裏師云放下數珠更道始得紹驀豎拳云聻師云百尺竿頭弄嶮巘系云將為別有師云夢裏説惺惺衆下語不契師代云到家何必問途程問衆離心意識參絶凡聖路學只如離心意識作麼生參緒云某甲不敢節外生枝紹云本自無瘡勿傷之也系云鉢盂何必重添柄師云一模脫出不堪共語乃代云如無手人行拳問衆衲衣在空間假名阿練若如何是真阿練若衆下語不契師代云常在於其中經行及坐臥問衆既是演武場中因甚偃旗息鼓衆競下語師俱不肯乃代云不見道天下太平
