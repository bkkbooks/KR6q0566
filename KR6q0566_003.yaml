body:
  text: 侍者成純記録室中舉古殃崛摩羅尊者因持鉢至一長者門其家婦人正值産難長者云瞿曇弟子汝為至聖當有何法能免産難殃崛語長者曰我乍入道未知此法待我回問世尊卻來相告卻反白佛佛告殃崛汝速去報言我從賢聖法來未曾殺生崛奉佛語疾往告之其婦得聞當時分娩尊者隨人起倒世尊露面作竊以致遞相鈍置某若見問持鉢便行何故免得教壞人家男女維摩會上三十二菩薩各說不二法門文殊云我於一切法無言無說無示無識離諸問答是為菩薩入不二法門殊問維摩維默然殊讚曰乃至無有語言文字是菩薩真入不二法門維摩默然無本可據文殊讚善拗曲作直若是不二法門三生六十劫大隨一日菴前偶見一龜僧指問云一切衆生皮褁骨因甚者箇衆生骨褁皮隨以草鞋覆卻草鞋覆卻雖然坐斷千差且無出身之路我若見問劈脊便棒且道是皮耶是骨耶非但開卻者僧眼亦免得諸人向形骸上著到世尊臨入涅槃文殊大士請佛再轉法輪世尊咄曰文殊吾四十九年住世未曾說著一字汝請吾再轉法輪是吾曾轉法輪耶善哉希有聞所未聞道吾因石霜問和尚百年後有人問極則事向他道甚麼吾喚沙彌添淨水著彌添水畢吾謂霜曰問甚麼霜擬更問吾便歸方丈轉功就位句不停機換斗移星絲來線去還他道吾好手若是極則事敢保未在不見道平蕪盡處是青山行人更在青山外世尊初生一手指天一手指地周行七步目顧四方自言天上天下惟吾獨尊雲門云我當時若見一棒打殺與狗子喫貴圖天下太平黃面瞿曇放憨賣俏不顧傍觀者哂跛腳雲門路見不平未免垛生招箭檢點將來二俱不了何似荷上座侵晨淨面黃昏打眠遇飯喫飯遇茶喫茶更不敢與諸昆仲牽枝引蔓何故道泰不傳天子敕時清休唱太平歌烏石食麵次有僧參石引麵示之僧便去石至晚間首座新到在甚麼處座云當時便去了也石曰是即是只得一橛烏石將機就機太煞廉纖者僧雖是一撥便轉腳跟下好與三十拄杖何故不合上人家門戶趙州一日因一婆子入齊堂曰者堂師僧俱是婆婆生底惟有大孩兒忤逆不孝州才舉首看婆便出婆子步步登高不覺全身負墮趙老顧後瞻前未免當斷不斷山僧若見恁麼道但言更須識取阿爺始得管教者臭老婆慚惶無地文殊菩薩一日令善財採藥曰是藥採將來善財遍觀大地無不是藥卻來白云無有不是藥者曰是藥採將來善財遂與地上拈一莖草度與文殊殊接得示衆曰此藥能殺人亦能活人善財握土成金已是通身泥水文殊殺活全彰可惜龍頭蛇尾我若見道無有不是藥者劈脊便棒何故若不揮劍漁父棲巢趙州到一菴主處問曰有麼有麼主豎起拳頭州曰水淺不是泊舟處便行又到一菴主處問主亦豎起拳頭州曰能縱能奪能殺能活便作禮大小趙州洎被二菴主換卻眼睛山僧路見不平驀豎拳云能縱能奪能殺能活汝等諸人若便恁麼會去一棒打折你驢腰南泉歸宗麻谷同去禮南陽國師泉於路上畫一圓相云道得即去宗便於圓相中坐谷作女人拜泉云恁麼則不去也宗曰是甚麼心行泉乃喚回更不去禮國師南泉弄假僞真歸宗將錯就錯麻谷末上殷勤未免隨邪逐惡恁麼則不去也又作麼生路遠夜長休把火大家吹滅暗中行雪峰因僧參次峰問甚處曰浙中云船來陸來曰二途俱不涉云爭得到者裏曰有甚麼隔礙峰打趁十年後僧復來峰問甚處來曰湖南云湖南與此間相去多少曰不隔峰舉拂子云還隔者個麼曰若隔爭得到者裏峰亦打趁其僧住後每見人必詬罵雪峰同行聞特去相訪遂與點破其僧每於中夜焚香向雪峰遙禮雪峰老漢向萬仞崖前垂手千尺井底救人費盡腕頭氣力洎合勞而無功者僧三搭不回亦似純鋼鑄就末上因甚瓦解冰消去敢問諸人淆訛在甚麼處未到盡驚山險峻曾來方識路高低趙州因僧問如何是毗盧圓相曰自小出家不曾眼花大小趙州秖解全身遠害若是入廛垂手敢保未在設有人問如何是毗盧圓相碟兒大碗兒小山僧恁麼答話且道與古人還有優劣也無卓拄杖云梅須遜雪三分白雪卻輸梅一段香城東有一老姥與佛同生不欲見佛每見佛來即便回避雖然如此回顧東西總皆是佛遂以手掩面乃至十指掌中總皆是佛老姥雖然氣宇如王未免一生擔版我即不然任他佛來魔來總與箇普同供養何故大海若不納百川應倒流趙州因尼問如何是密密意州於尼腕上捏一捏尼云和尚猶有者箇在曰卻是你有者箇在當時此尼若是箇人但云衆眼難瞞管教者老漢藏身無地昔有婆子供一僧常令二八女子給侍一日令女子抱定云正恁麼時如何僧云枯木倚寒巖三冬無暖氣女回舉似婆婆云我二十年只供得箇俗漢遂遣僧去燒卻菴婆子雖有定亂之謀且無容人之量我若見僧恁麼道更加一分供養何故為人須為徹盤山云向上一路千聖不傳慈明云向上一路千聖不然妙喜云向上一路熱碗鳴聲向上一路步步踏著昔有僧到曹溪時守衣鉢僧提起衣曰此是大庾嶺頭提不起底曰為甚在上座手裏僧無對代云一任舉似諸方昔有老宿問一座主疏鈔解義廣略如何曰鈔解疏疏解經宿曰經解甚麼主無對代云洎合錯下注腳長慶因僧問衆手淘金誰是得者慶云有伎倆者得曰學人還得麼云太遠在別云無伎倆者得別後語云汝有伎倆在法眼問永明潛云教中道隔壁聞叉釧聲即名破戒現前笙歌雜還珠紫駢闐且道是破不破明云好箇入路別云眼裏無筋一世貧菴提遮女問文殊明知生是不生之理因甚卻被生死之所流轉殊云其力未充別云現大人相頌古世尊未離兜率已降皇宮未出母胎度人已畢火裏蟭螟吞大象雲中鐵鷂産泥牛情枯執謝超三際正體堂堂靡不周世尊拈華鹽自鹹兮蜜自甜那堪矢上又加尖拈花若謂傳心印迦葉而今笑更添經云諸可還者自然非汝不汝還者非汝而誰從前汗馬渾間事罷卻干戈百草頭漢地不收秦不管一身還有一身愁文殊令善財採藥門門有路透長安滿目青黃豈易觀了卻從前三不是文殊早被善財瞞經題火字文彩全彰鑑者稀幾人於此辨端倪十成好箇金剛鑽攤向街頭賣與誰維摩經不斷煩惱而入涅槃一二三四五六七煩惱菩提是何物風前剪斷葛藤窠一言勘破維摩詰百丈野鴨子話湖光淡蕩碧天秋父子相將草裏游無限落花隨水去不令人見轉風流臨濟示衆云大凡演唱宗乘一句中須具三玄門一玄門須具三要有權有實有照有用便下座羲皇畫卦亦奇哉朕兆才分理事該若識五行顛倒用吉凶禍福絶安排南院啐啄同時話箭鋒相拄芥投針見處何如用處親佛口蛇心風穴老一言賺殺幾多人三聖云我逢即出出則不為人興化云我逢人則不出出即便為人出不出為不為明眼人前莫屎沸便恁麼去絶商量也是瞎驢趁大隊復云噁趙州示衆云佛之一字吾不喜聞碧天雲淡晚風寒醉把瑤琴月下彈將謂調高人不識誰知自被指頭瞞臨濟示衆云我當時在黃檗先師處問佛法的的大意三度被打六十拄杖如蒿枝拂相似如今更思一頓誰為下手時有僧出云某甲下手濟度拄杖與僧僧擬接濟便打白髮佳人憶嫁時幾番含笑幾番悲兒曹只解兒曹事一段風流說向誰曹山因僧問子歸就父為甚父全不顧山云理合如是僧云父子之情何在山云始見父子之情僧云如何是父子情山云刀斧斫不開直下渾忘祖父尊肯將知解論疏親從教六國煙塵靜須信乾坤奉一人應菴和尚問密菴傑如何是正法眼藏密菴云破砂盆千聖欲名名不得如何喚作破砂盆呼童拋在江心裏免纍時人掛齒唇五祖演和尚示衆云譬如牛過窗櫺頭角四蹄俱過了因甚尾巴過不得通身手眼通身縛對境無心被境迷歷遍千門併萬戶依然鼻孔大頭垂法眼問永明律中道隔壁聞叉釧聲即名破戒現前笙歌雜還朱紫駢闐且道是破不破明云好箇入路蓋色騎聲一句子五篇七聚實難詮筆描菩薩火裏走泥捏金剛水底眠也無妙也無玄莫把封皮作信傳南泉因陸亙大夫問肇法師甚奇特解道天地與我同根萬物與我一體泉指庭前牡丹云時人見此一株花如夢相似天地同根物不殊僧俗何分釋與儒庭花指出渾如夢一片冰心在玉壺藥山因高沙彌住菴後一日歸來值雨山云汝來也彌云是山云可煞濕彌云不打者鼓笛雲巖云皮也無打甚麼鼓道吾云鼓也無打甚麼皮山云今日大好一場曲調畫船簫鼓泛清波異口同聲唱哩囉趙璧燕金未是貴一家和氣值錢多無業國師云一毫頭凡聖情念不盡未免入驢胎馬腹裏去白雲端和尚云設使一毫凡聖情念淨盡亦未免入驢胎馬腹裏去聖凡情解俱消盡馬腹驢胎得自由有意氣時添意氣不風流處也風流芙蓉一日辭歸宗宗云甚處去蓉云歸領去宗云子在此多年裝束了上來為子說一上佛法蓉結束了上去宗云近前來蓉乃近前宗云途中善為蓉聆此言頓忘前解昧卻自家珍寶波波向外尋討縱於言下知歸未免隨人起倒大隨覆龜話皮褁骨兮骨褁皮草鞋覆卻露全軀知音不用頻頻舉脫體風流更有誰智門因僧問蓮花未出水時如何門云蓮花僧云出水後如何門云荷葉蓮花荷葉一枝枝出水何如未出時透網金鱗頭戴角𮭗𮭗猶自守空池修山主因僧問劫火洞然大千俱壞未審者箇壞不壞修云不壞僧云因甚不壞修云為同大千春來和氣氤氳秋後霜風凜冽任他節序遷移甕裏何曾走鱉祥菴主示寂日拈拄杖示衆云古人到者裏為甚麼不肯住衆無對乃云為他途路不得力復云畢竟如何以杖橫肩云楖栗橫擔不顧人直入千峰萬峰去言畢而逝直入千峰與萬峰依然只在半途中當時若解歸家語楖栗何須肩上橫臨濟因普化在僧堂前喫生菜濟見云大似一頭驢化便作驢鳴濟謂直歲云細抹草料著化云少室人不識金陵又再來臨濟一隻眼到處為人開脫珍反著破斕衫驀遇知音滿面慚陌上相逢山頂立異途同轍到長安首山因僧問如何是佛山云新婦騎驢阿家牽新婦愛騎驢阿家牽了走新婦與阿家翻手及覆手首山齒缺不闢風逢人慣自揚家醜雲門因僧問如何是佛門云乾矢橛風吹日炙露荒田信手拈來作話傳逐塊韓盧難辨的終朝立在糞缸邊臨濟將示寂謂衆云吾滅後不得滅卻我正法眼藏三聖云爭敢滅卻和尚正法眼藏濟云已後有人問你向他道甚麼聖便喝濟云誰知我正法眼藏向者瞎驢邊滅卻言訖端坐而逝從來養子見生緣末上殷勤更可憐縱有黃金過北斗好兒終不使爺錢百丈野狐不落不昧同因果墮脫都盧一野狐無事晚來江上望片帆隱隱夕暘初德山拓鉢攀華意不在枝頭攪亂群芳蜂蝶愁暗裏偷香頻賣弄卻教骨肉翻成讎孚上座聞角聲有省情忘理極口難開驀聽譙樓角催撥轉上頭關捩子月移花影入窗來臨濟問黃檗佛法大意三度被打直下投身探虎穴無依倚處肝腸裂烏藤三頓拂蒿枝父子不傳真祕訣後參大愚有省肋下還拳正眼開豈從黃檗學將來更言佛法無多子卻似晴空震地雷雲門放洞山三頓棒當日韶陽曾據令電光影裏分邪正都緣一鏃破三關喪卻洞山窮性命夾山參船子和尚落水點頭猶未瞥覆舟自逝話難圓相親唯有沙汀雁夜宿蘆花兩岸邊長沙因僧問如何是上上人行履處沙云如死人眼曰上上人相見時如何沙云如死人手從來作者遇知音水入水兮金博金鑑覺精純玄體昧髑髏識盡眼初明央崛産難衆生惑業苦相隨花不生空眼自迷賢聖法來無障礙分明一句示全提涅槃會上廣頞屠兒放下屠刀云我是千佛一數放下屠刀云是佛丈夫何故自甘屈俊哉大集會魔王百煉精金不變色女子出定同坐同行難比況各人境界各人知那伽本是真常性動靜何曾有間時雲巖因道吾問大悲千手眼阿那箇是正眼云云遍體通身露一斑頭頭總是自家顏殿前幡影風移去砌下花陰月送還黃檗示衆云汝等諸人盡是噇酒糟漢云云參方要具參方眼見地還須見地句莫向他人行處行丈夫自有沖霄志香嚴上樹本來成現豈多岐何必將身掛樹枝不得虎頭伸一問婆心費盡有誰知趙州因僧問如何是祖師西來意州云庭前柏樹子趙州不會西來意卻把庭前柏樹推懞懂禪流難辨別又從柏樹上針錐趙州因僧問學人乍入叢林乞師指示州云喫粥也未曰喫粥了也州云洗鉢盂去僧於言下有省見利竿回應喫棒現成公案復何疑若從洗鉢盂邊會未免重添眼上眉趙州勘婆子語若然未透趙州關箇裏當知行路難婆子為伊勘破了輕如毫末重如山趙州訪二菴主縱奪臨時顯大用風馳電捲驗知音而今欲識曾行處八兩依前只半斤天王道悟禪師尋常云快活快活及至臨終乃叫苦苦又云閻羅王取我也院主問和尚當初被節度使拋在水中神色不動如今何得恁麼地王推出枕子云汝道當初是如今是主無對王乃趨寂樂則樂苦則苦五五從來二十五百草頭邊徹一玄方得名為主中主婆子燒菴話高山流水貴知音黃葉休將認作金自古為僧元不易果然最毒婦人心雲門因僧問如何是西來意門云日裡看山山從日裡看一一無遮障言下忽知歸西來真榜樣玄沙因普請斫柴次見一虎天龍曰和尚虎沙云是汝虎歸院後天龍問適來見虎云是汝未審尊意如何沙云娑婆世界有四種極重事若人透得不妨出得陰界鐵壁銀山一拶開從教大地絶纖埃令人常憶玄沙老是汝之言實快哉玄沙三種病人語玄沙曲垂方便瘖啞肓聾不薦雲門雪上加霜賺人墮坑落塹玄沙因僧禮拜次沙云因我得禮你因我得禮你撥波而見水虛空劄地崩當下偷心死香林因僧問如何是衲衣下事林云臘月火燒山臘月火燒山香林露舊顏本光瑞如此大地沒遮攔高峰枕子因緣寤寐從教明歷歷絶思量處費安排翻身枕子驚殘夢花影橫窗月上階疏山造塔話塔成面圓渾無縫工價重拈驗作家更有羅山多口老賺他天下事如麻狗子無佛性話澄潭不許蒼龍蟠烈焰偏容蚊蚋泊利劍揮空海嶽昏泥牛掣斷黃金索黃龍三關佛手驢腳與生緣兔角龜毛一串穿倣佛十成無價寶依然不值半文錢本來面目話萬籟無聲泉石冷長空雲散碧天寬豁開兩眼看明月莫似從前指上觀雪峰因入山採得一株木其形似蛇於背上題曰本自天然不假雕琢寄長慶安禪師安曰本色住山人且無刀斧痕本自生成不假雕拈來特地驗同條知音未肯重添足留與諸方取次描高峰問衆盡大地是火坑得何三昧不被燒卻高峰老子多饒舌大地從教火一團透網金鱗猶滯水果然身裏出門難未達境惟心起種種分別境界自心現迷妄生欣厭而於一法中起諸顛倒見達境惟心已分別即不生境界自心現何欣復何厭一切事尋常莫起尋常見曹山問強上座佛真法身猶若虛空應物現形如水中月作麼生說箇應底道理曰如驢覷井云云驢覷井兮井覷驢渠今是我我非渠長空月印千江水遍界分形體自如瑞巖主人公話慚愧當年師彥老自呼自諾機關少逢人慣自說惺惺直至而今猶未了黃龍南和尚垂語云鐘樓上念讚床腳下種菜云云床腳鐘樓事似麻等閒拈出驗龍蛇當塗虎踞行蹤絶坐斷千岐始到家雲門因僧問樹凋葉落時如何門云體露金風秋高氣爽神清暢林木蕭疏眼界寬若道金風全體露雲門自覺骨毛寒百丈惟政禪師有老宿見日影透窗乃問云窗就日日就窗政云長老房中有客歸去好窗就日兮日就窗前塵不了費商量房中有客還歸去歸到無歸始見常甘贄行者入南泉設齊云云知音何在口喃喃眨上眉毛即不堪可怪俗流無道理卻來者裏顯顢頇巖頭因沙汰甘贄家過夏補衣次贄行過頭以針作劄勢贄遂整衣欲謝妻問曰作甚麼贄云說不得妻曰也要大家知贄舉前話妻云此去三十年須知一回飲水一回噎女子聞云誰知盡大地人性命被奯上座劄將去也針尖頭上露鋒鋩大地從教不覆藏粉骨碎身誰會得令他婦女費商量古德油餈到莊喫油餈足不離方丈可憐眼搭特地尋模樣倩女離魂話與郎分袂侍郎行一對鴛鴦畫不成枕上夢回春漏寂透簾斜月照孤衾天童密祖因僧問猛虎以肉為命因甚不食其子童云自肉食不盡野猿抱子歸青嶂幽鳥銜花過碧岑滿目風光皆自得了無遺法纍兒孫天岸老和尚因居士問一國之中尚有語音不對十方世界數若微塵如何是世界不異底的的句岸云諸惡莫作衆善奉行諸惡莫作衆善奉行他方此土歷歷分明了知解語非干舌始識家家觀世音的的句為施陳霜天月夜搗衣聲天岸老和尚因僧問教中道二諦融通三昧印如何是真諦岸云殺狗屠牛僧云如何是俗諦岸云成佛作祖僧云作麼生融通岸云屠兒成佛觸目玄黃理事均那堪更問俗和真還他作者無分別信手拈來著著親演教寺禮大悲懺偶丐婦攜童子至衆云觀世音菩薩來也將到壇前知事者趁出有問云終日翹勤頂禮菩薩及乎菩薩到來因甚趁出衆無對師代云恐諸人執藥成病欲登彼岸應須渡既到當知勿用舟若是執迷仍戀筏依然不免溺中流
